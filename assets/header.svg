<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Cyan & Magenta Glow Filters for Name -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Gradient for Text -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="100%" stop-color="#FF00FF" />
    </linearGradient>

    <!-- Gradient for Phoenix -->
    <linearGradient id="phoenixGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="50%" stop-color="#8A2BE2" />
      <stop offset="100%" stop-color="#FF00FF" />
    </linearGradient>

    <!-- FIXED: Typing Animation Mask widened to 360 to fit UAV text -->
    <clipPath id="typing-clip">
      <rect x="30" y="20" width="0" height="30">
        <animate attributeName="width" values="0; 360; 360; 0" keyTimes="0; 0.35; 0.75; 1" dur="4s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <style>
    /* Background & Structural Styles */
    .bg { fill: #050B14; }
    .box-outline { fill: none; stroke: #00FFFF; stroke-width: 2; opacity: 0.3; rx: 15; }
    
    /* Star Animations */
    .star { fill: #FFFFFF; animation: twinkle 3s infinite alternate; }
    .star-fast { fill: #FFFFFF; animation: twinkle 1.5s infinite alternate; }
    
    /* Phoenix Styles & Animation */
    .phoenix-lines { 
      fill: none; 
      stroke: url(#phoenixGrad); 
      stroke-width: 1.5; 
    }
    .phoenix-group {
      transform-origin: 400px 150px;
      animation: pulse-phoenix 4s ease-in-out infinite;
    }
    
    /* Text Styles */
    .name-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 58px;
      font-weight: bold;
      fill: url(#textGradient);
      filter: url(#neonGlow);
      letter-spacing: 5px;
    }
    
    .terminal-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      fill: #00FFFF;
      opacity: 0.85;
      font-weight: 600;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.4); filter: drop-shadow(0 0 3px #fff); }
    }

    @keyframes pulse-phoenix {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(0, 255, 255, 0.4)); }
      50% { transform: scale(1.03); filter: drop-shadow(0 0 8px rgba(255, 0, 255, 0.7)); }
    }
  </style>

  <!-- Background Base -->
  <rect class="bg" width="100%" height="100%" rx="15" />
  
  <!-- Outer glowing terminal border -->
  <rect class="box-outline" x="10" y="10" width="780" height="280" />

  <!-- THE PHOENIX CONSTELLATION (Animated & Geometric) -->
  <g class="phoenix-group">
    <!-- Geometric Web Lines -->
    <path class="phoenix-lines" d="
      M 400 45 L 385 65 L 400 80 L 415 65 Z
      M 385 65 L 360 70 L 395 75
      M 415 65 L 440 70 L 405 75
      
      M 400 80 L 400 120 L 400 160
      
      M 400 80 L 320 60 L 240 45 L 160 40
      M 400 120 L 340 90 L 280 85 L 200 75 L 160 40
      M 320 60 L 340 90 L 240 45 L 280 85 L 160 40 L 200 75
      M 400 160 L 360 120 L 300 110 L 200 75
      M 340 90 L 360 120 L 280 85 L 300 110
      
      M 400 80 L 480 60 L 560 45 L 640 40
      M 400 120 L 460 90 L 520 85 L 600 75 L 640 40
      M 480 60 L 460 90 L 560 45 L 520 85 L 640 40 L 600 75
      M 400 160 L 440 120 L 500 110 L 600 75
      M 460 90 L 440 120 L 520 85 L 500 110
      
      M 400 160 L 370 200 L 400 270 L 430 200 Z
      M 370 200 L 350 240 L 400 270 L 450 240 L 430 200
      M 370 200 L 400 230 L 430 200
    " />

    <!-- Phoenix Node Stars -->
    <circle class="star-fast" cx="400" cy="45" r="2" />
    <circle class="star" cx="385" cy="65" r="1.5" />
    <circle class="star" cx="415" cy="65" r="1.5" />
    <circle class="star" cx="360" cy="70" r="1" />
    <circle class="star" cx="440" cy="70" r="1" />
    
    <!-- Spine -->
    <circle class="star-fast" cx="400" cy="80" r="2.5" />
    <circle class="star" cx="400" cy="120" r="3" />
    <circle class="star-fast" cx="400" cy="160" r="2.5" />
    
    <!-- Left Wing Nodes -->
    <circle class="star" cx="320" cy="60" r="2" />
    <circle class="star-fast" cx="240" cy="45" r="2" />
    <circle class="star" cx="160" cy="40" r="1.5" />
    <circle class="star-fast" cx="340" cy="90" r="1.5" />
    <circle class="star" cx="280" cy="85" r="1.5" />
    <circle class="star-fast" cx="200" cy="75" r="1.5" />
    <circle class="star" cx="360" cy="120" r="2" />
    <circle class="star" cx="300" cy="110" r="1.5" />
    
    <!-- Right Wing Nodes -->
    <circle class="star" cx="480" cy="60" r="2" />
    <circle class="star-fast" cx="560" cy="45" r="2" />
    <circle class="star" cx="640" cy="40" r="1.5" />
    <circle class="star-fast" cx="460" cy="90" r="1.5" />
    <circle class="star" cx="520" cy="85" r="1.5" />
    <circle class="star-fast" cx="600" cy="75" r="1.5" />
    <circle class="star" cx="440" cy="120" r="2" />
    <circle class="star" cx="500" cy="110" r="1.5" />
    
    <!-- Tail Nodes -->
    <circle class="star" cx="370" cy="200" r="2" />
    <circle class="star" cx="430" cy="200" r="2" />
    <circle class="star-fast" cx="350" cy="240" r="1.5" />
    <circle class="star-fast" cx="450" cy="240" r="1.5" />
    <circle class="star" cx="400" cy="270" r="2.5" />
  </g>

  <!-- Ambient Space Stars -->
  <circle class="star" cx="100" cy="60" r="1" />
  <circle class="star-fast" cx="700" cy="220" r="1.5" />
  <circle class="star" cx="150" cy="250" r="1.5" />
  <circle class="star" cx="650" cy="40" r="1" />
  <circle class="star-fast" cx="80" cy="150" r="1" />
  <circle class="star" cx="740" cy="130" r="1.5" />

  <!-- CENTER: Glow Name Display -->
  <text x="50%" y="58%" text-anchor="middle" class="name-text">ABHA SINGH</text>

  <!-- TOP LEFT: Animated Typing Roles (Cycles every 4 seconds, 12 seconds total) -->
  <g opacity="1">
    <animate attributeName="opacity" values="1;1;0;0;0;0" keyTimes="0; 0.33; 0.331; 0.66; 0.661; 1" dur="12s" repeatCount="indefinite" />
    <text x="30" y="40" class="terminal-text" clip-path="url(#typing-clip)">> Role: Full-Stack Engineer</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.33; 0.331; 0.66; 0.661; 1" dur="12s" repeatCount="indefinite" />
    <text x="30" y="40" class="terminal-text" clip-path="url(#typing-clip)">> Role: AI Systems Developer</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0; 0.33; 0.331; 0.66; 0.661; 1" dur="12s" repeatCount="indefinite" />
    <text x="30" y="40" class="terminal-text" clip-path="url(#typing-clip)">> Role: UAV &amp; Autonomous Systems</text>
  </g>

  <!-- BOTTOM RIGHT: Static Telemetry Box -->
  <text x="520" y="210" class="terminal-text">SYSTEM_STATUS: ONLINE</text>
  <text x="520" y="230" class="terminal-text">OPEN_SOURCE_PROTOCOLS: ACTIVE</text>
  <text x="520" y="250" class="terminal-text">OPERATIONAL_SCOPE: WEB // AI // UAV</text>
  <text x="520" y="270" class="terminal-text">OBJECTIVE: 2026 DEPLOYMENT</text>
</svg>

