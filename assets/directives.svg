<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%">
  <defs>
    <!-- Animated Color-Shifting Glass Edge Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#00FFFF;#FF00FF;#00FFFF" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#8A2BE2" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0.9">
        <animate attributeName="stop-color" values="#FF00FF;#00FFFF;#FF00FF" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <!-- Clipping path to keep the scanner inside the UI -->
    <clipPath id="panel-clip">
      <rect x="10" y="10" width="780" height="300" rx="12" />
    </clipPath>
  </defs>

  <style>
    .panel { 
      fill: rgba(10, 15, 30, 0.4); 
      stroke: url(#glassGrad); 
      stroke-width: 1.5; 
      rx: 12; 
    }
    .title { 
      font-family: 'Courier New', Courier, monospace; 
      font-size: 16px; 
      font-weight: bold; 
      fill: #00FFFF; 
      letter-spacing: 2px; 
    }
    .text-main { 
      font-family: 'Courier New', Courier, monospace; 
      font-size: 13px; 
      fill: #E6EDF3; 
    }
    .text-highlight { 
      fill: #FF00FF; 
      font-weight: bold; 
    }
    .category { 
      font-family: 'Courier New', Courier, monospace; 
      font-size: 14px; 
      font-weight: bold; 
      fill: #00FFFF; 
      opacity: 1;
      animation: pulse 3s infinite alternate;
    }
    .stack-item { 
      font-family: 'Courier New', Courier, monospace; 
      font-size: 13px; 
      fill: #E6EDF3; 
    }
    .line { 
      stroke: #00FFFF; 
      stroke-width: 1; 
      opacity: 0.4; 
    }
    .scanner {
      fill: url(#glassGrad);
      opacity: 0.15;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
  </style>
  
  <!-- Animated Scanner Background -->
  <g clip-path="url(#panel-clip)">
    <rect x="10" y="10" width="780" height="40" class="scanner">
      <animate attributeName="y" values="-30; 320; -30" dur="6s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- DIRECTIVES PANEL -->
  <rect class="panel" x="10" y="10" width="780" height="120" />
  <text x="30" y="40" class="title">SYSTEM PROTOCOLS &amp; CURRENT DIRECTIVES</text>
  <line class="line" x1="30" y1="50" x2="400" y2="50" />
  
  <text x="30" y="75" class="text-main"><tspan class="text-highlight">CORE_SYSTEMS:</tspan> Full-Stack Web Dev, Artificial Intelligence, and Autonomous UAVs.</text>
  <text x="30" y="95" class="text-main"><tspan class="text-highlight">CURRENT_MISSION:</tspan> Bridging software and hardware through open-source R&amp;D.</text>
  <text x="30" y="115" class="text-main"><tspan class="text-highlight">STATUS:</tspan> 2026 DEPLOYMENT</text>

  <!-- TECH STACK PANEL -->
  <rect class="panel" x="10" y="150" width="780" height="160" />
  <text x="30" y="180" class="title">WEAPONRY &amp; TECH STACK</text>
  <line class="line" x1="30" y1="190" x2="260" y2="190" />
  
  <!-- Stack Columns -->
  <text x="30" y="225" class="category">[ LANGUAGES ]</text>
  <text x="30" y="245" class="stack-item">C++ // PYTHON // JAVA // JAVASCRIPT</text>

  <text x="370" y="225" class="category">[ FRONTEND ]</text>
  <text x="370" y="245" class="stack-item">REACT // TAILWIND // HTML5</text>

  <text x="630" y="225" class="category">[ DATABASE ]</text>
  <text x="630" y="245" class="stack-item">POSTGRESQL // SQL</text>

  <text x="30" y="280" class="category">[ AI, VISION &amp; AUTONOMY ]</text>
  <text x="30" y="300" class="stack-item">PYTORCH // MATLAB // COMPUTER VISION</text>
</svg>
